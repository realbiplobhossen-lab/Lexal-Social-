name: Android Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-cache: 'npm'
          node-version: 20

      - name: Install Java (Required for Android Build)
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Project Dependencies
        run: npm install

      - name: Install Capacitor CLI, Core & Android
        run: npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Create and Verify Web Asset Directory
        run: |
          mkdir -p dist
          cp -r *.js *.css package.json dist/ 2>/dev/null || true
          if [ ! -f dist/index.html ]; then
            echo '<!DOCTYPE html><html><head><meta charset="utf-8"><title>Lexal Social</title><script type="module" src="index.js"></script></head><body><div id="app"></div></body></html>' > dist/index.html
          fi

      - name: Initialize Capacitor Android Platform
        run: |
          npx cap init "Lexal Social" "com.lexalsocial.app" --web-dir=dist
          npx cap add android

      - name: Sync Web Code to Android Native Project
        run: |
          mkdir -p android/app/src/main/assets
          echo '[]' > android/app/src/main/assets/capacitor.plugins.json
          npx cap sync android

      # ডুপ্লিকেট কোটলিন ক্লাসের এরর এড়াতে গ্রেডল কনফিগারেশনে বাধ্য করা হচ্ছে
      - name: Fix Duplicate Kotlin Dependencies
        run: |
          cd android
          echo "configurations.all { resolutionStrategy { eachDependency { DependencyResolveDetails details -> if (details.requested.group == 'org.jetbrains.kotlin') { details.useVersion '1.8.22' } } } }" >> build.gradle

      # ডুপ্লিকেট ক্যাশ বা ক্লাস এড়াতে প্রথমে গ্রেডল প্রজেক্টটি ক্লিন করা হচ্ছে এবং তারপর বিল্ড চালানো হচ্ছে
      - name: Build Android Debug APK
        run: |
          cd android
          ./gradlew clean
          ./gradlew assembleDebug --no-daemon
          

      - name: Upload Generated APK to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Lexal-Social-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
