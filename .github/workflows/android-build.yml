name: Android Capacitor Dynamic Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # উবুন্টু সার্ভারের নিজস্ব জাভা ১৭ পাথ সেট করা
      - name: Locate and Set Default System Java
        run: |
          echo "JAVA_HOME=$JAVA_HOME_17_X64" >> $GITHUB_ENV
          echo "PATH=$JAVA_HOME_17_X64/bin:$PATH" >> $GITHUB_ENV

      # অফিশিয়াল অ্যান্ড্রয়েড SDK এনভায়রনমেন্ট সেটআপ
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # package.json দেখে প্রয়োজনীয় প্লাগইন ও লাইব্রেরি ইন্সটল
      - name: Install Project Dependencies
        run: npm install

      # আপনার কোড প্রোডাকশন রেডি করে 'dist' ফোল্ডার তৈরি
      - name: Build Web Asset (Vite Production)
        run: npm run build

      # ফ্রেশ অ্যান্ড্রয়েড নেটিভ ডিরেক্টরি জেনারেট করা
      - name: Generate Native Android Directory
        run: |
          npx cap add android || true

      # কোডগুলোকে অ্যান্ড্রয়েড প্রজেক্টে পুশ ও সিঙ্ক করা
      - name: Sync Code to Android
        run: |
          npx cap sync android

      # ফোনের জন্য আসল .apk ফাইল তৈরি করা (কোনো স্ক্রিপ্ট ইনজেকশন ছাড়া একদম ফ্রেশ বিল্ড)
      - name: Build Android Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleDebug --no-daemon
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      # জেনারেট হওয়া APK ফাইলটি ডাউনলোডের জন্য অ্যাকশনস ট্যাবে আপলোড করা
      - name: Upload Generated APK
        uses: actions/upload-artifact@v4
        with:
          name: Lexal-Social-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
