name: Android Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-cache: 'npm'
          node-version: 20

      - name: Install Java (Required for Android Build)
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Project Dependencies
        run: npm install

      # এখানে Capacitor CLI, Core এবং Android প্ল্যাটফর্ম প্যাকেজ ইনস্টল করা হচ্ছে
      - name: Install Capacitor CLI, Core & Android
        run: npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Create Web Asset Directory
        run: mkdir -p dist && cp -r * dist/ 2>/dev/null || true

      - name: Initialize Capacitor Android Platform
        run: |
          npx cap init "Lexal Social" "com.lexalsocial.app" --web-dir=dist
          npx cap add android

      - name: Sync Web Code to Android Native Project
        run: npx cap sync android

      - name: Build Android Debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload Generated APK to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Lexal-Social-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
