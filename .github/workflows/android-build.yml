name: Android Capacitor Dynamic Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up JDK 17 (Standard Android Build)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin' # জ্যুলু বাদ দিয়ে টেমুরিন ব্যবহার করা হয়েছে যা পাথ অটো-কনফিগ করে
          java-version: '17'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Project Dependencies
        run: npm install

      - name: Build Web Asset (Vite Production)
        run: npm run build

      - name: Generate Native Android Directory
        run: |
          npx cap add android || true

      - name: Sync Code to Android
        run: |
          npx cap sync android

      - name: Inject Strict Gradle Duplicate Fixes
        run: |
          cd android
          sed -i '/android {/a \    packagingOptions {\n        resources {\n            excludes += ["META-INF/*.kotlin_module", "META-INF/kotlin-stdlib-jdk7.kotlin_module", "META-INF/kotlin-stdlib-jdk8.kotlin_module", "META-INF/kotlin-stdlib.kotlin_module"]\n        }\n    }' app/build.gradle
          echo "subprojects { project -> if (project.hasProperty('android')) { android { packagingOptions { resources { excludes += ['META-INF/搶otlin_module', 'META-INF/*'] } } } } }" >> build.gradle
          echo "allprojects { configurations.all { resolutionStrategy { eachDependency { details -> if (details.requested.group == 'org.jetbrains.kotlin') { details.useVersion '1.8.22' } } } } }" >> build.gradle

      # স্বয়ংক্রিয় জাভা হোম পাথ ডিটেকশন ও গ্র্যাডল বিল্ড
      - name: Build Android Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleDebug --no-daemon

      - name: Upload Generated APK
        uses: actions/upload-artifact@v4
        with:
          name: Lexal-Social-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
