name: Android Capacitor Dynamic Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Core Dependencies
        run: npm install

      # ক্যপাসিটরের জন্য প্রয়োজনীয় প্লাগইন গিটহাব রানারে ইনস্টল করা
      - name: Install Capacitor CLI & Android Packages
        run: npm install @capacitor/core @capacitor/cli @capacitor/android

      # এটি আপনার নতুন ডাইনামিক .jsx এবং .css ফাইলগুলোকে 'dist' ফোল্ডারে বিল্ড করবে
      - name: Build Web Asset (Vite Production)
        run: npm run build

      # ক্যপাসিটর কনফিগারেশন এবং ফ্রেশ অ্যান্ড্রোয়েড ডিরেক্টরি তৈরি
      - name: Initialize Capacitor & Add Android Platform
        run: |
          npx cap init "Lexal Social" "com.lexalsocial.app" --web-dir=dist || true
          npx cap add android || true

      # সোর্স কোড অ্যান্ড্রয়েড প্রজেক্টে সিঙ্ক করা
      - name: Sync Code to Android
        run: npx cap sync android

      # গ্রেডল ডুপ্লিকেট ফাইল ইরর ফিক্স মেকানিজম
      - name: Inject Strict Gradle Duplicate Fixes
        run: |
          cd android
          sed -i '/android {/a \    packagingOptions {\n        resources {\n            excludes += ["META-INF/*.kotlin_module", "META-INF/kotlin-stdlib-jdk7.kotlin_module", "META-INF/kotlin-stdlib-jdk8.kotlin_module", "META-INF/kotlin-stdlib.kotlin_module"]\n        }\n    }' app/build.gradle
          echo "subprojects { project -> if (project.hasProperty('android')) { android { packagingOptions { resources { excludes += ['META-INF/搶otlin_module', 'META-INF/*'] } } } } }" >> build.gradle
          echo "allprojects { configurations.all { resolutionStrategy { eachDependency { details -> if (details.requested.group == 'org.jetbrains.kotlin') { details.useVersion '1.8.22' } } } } }" >> build.gradle

      # এটি আপনার আসল অ্যান্ড্রয়েড ফোনে ইন্সটল করার জন্য লাইভ .apk ফাইল তৈরি করবে
      - name: Build Android Debug APK
        run: |
          cd android
          ./gradlew clean
          ./gradlew assembleDebug --no-daemon

      # জেনারেট হওয়া APK ফাইলটি ডাউনলোডের জন্য আপলোড করা
      - name: Upload Generated APK
        uses: actions/upload-artifact@v4
        with:
          name: Lexal-Social-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
