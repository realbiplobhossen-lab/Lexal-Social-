name: Android Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-cache: 'npm'
          node-version: 20

      - name: Install Java (Required for Android Build)
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Project Dependencies
        run: npm install

      - name: Install Capacitor CLI, Core & Android
        run: npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Create and Verify Web Asset Directory
        run: |
          mkdir -p dist
          cp -r *.js *.css package.json dist/ 2>/dev/null || true
          if [ ! -f dist/index.html ]; then
            echo '<!DOCTYPE html><html><head><meta charset="utf-8"><title>Lexal Social</title><script type="module" src="index.js"></script></head><body><div id="app"></div></body></html>' > dist/index.html
          fi

      - name: Initialize Capacitor Android Platform
        run: |
          npx cap init "Lexal Social" "com.lexalsocial.app" --web-dir=dist
          npx cap add android

      - name: Sync Web Code to Android Native Project
        run: |
          mkdir -p android/app/src/main/assets
          echo '[]' > android/app/src/main/assets/capacitor.plugins.json
          npx cap sync android

      # ডুপ্লিকেট কোটলিন ক্লাস এবং মেটা-ডাটা সংঘাত দূর করার চূড়ান্ত কনফিগারেশন
      - name: Fix Android Gradle Properties & Build Config
        run: |
          cd android
          # ডুপ্লিকেট স্টুডিও ক্যাশ ও জেটপায়ার এনেবল করা
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          
          # অ্যাপ লেভেলের build.gradle ফাইলে এক্সক্লুড রুলস যুক্ত করা
          sed -i '/android {/a \    packagingOptions {\n        resources {\n            excludes += ["META-INF/*.kotlin_module", "META-INF/packages_debug_release.kotlin_module"]\n        }\n    }' app/build.gradle
          
          # কনফিগারেশন স্ট্র্যাটেজি সেট করা যাতে ডুপ্লিকেট কোটলিন লাইব্রেরি ফোর্সড-ফিক্স হয়
          echo "subprojects { project -> if (project.hasProperty('android')) { android { packagingOptions { resources { excludes += ['META-INF/搶otlin_module'] } } } } }" >> build.gradle

      - name: Build Android Debug APK
        run: |
          cd android
          ./gradlew clean
          ./gradlew assembleDebug --no-daemon

      - name: Upload Generated APK to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Lexal-Social-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
