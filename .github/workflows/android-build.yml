name: Android Capacitor Dynamic Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # গিটহাবের লিনাক্স সিস্টেমে আগে থেকে ইনস্টল থাকা ডিফল্ট জাভাকে সরাসরি সক্রিয় করা
      - name: Locate and Set Default System Java
        run: |
          echo "JAVA_HOME=$JAVA_HOME_17_X64" >> $GITHUB_ENV
          echo "PATH=$JAVA_HOME_17_X64/bin:$PATH" >> $GITHUB_ENV

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Project Dependencies
        run: npm install

      - name: Build Web Asset (Vite Production)
        run: npm run build

      - name: Generate Native Android Directory
        run: |
          npx cap add android || true

      - name: Sync Code to Android
        run: |
          npx cap sync android

      - name: Inject Strict Gradle Duplicate Fixes
        run: |
          cd android
          sed -i '/android {/a \    packagingOptions {\n        resources {\n            excludes += ["META-INF/*.kotlin_module", "META-INF/kotlin-stdlib-jdk7.kotlin_module", "META-INF/kotlin-stdlib-jdk8.kotlin_module", "META-INF/kotlin-stdlib.kotlin_module"]\n        }\n    }' app/build.gradle
          echo "subprojects { project -> if (project.hasProperty('android')) { android { packagingOptions { resources { excludes += ['META-INF/搶otlin_module', 'META-INF/*'] } } } } }" >> build.gradle
          echo "allprojects { configurations.all { resolutionStrategy { eachDependency { details -> if (details.requested.group == 'org.jetbrains.kotlin') { details.useVersion '1.8.22' } } } } }" >> build.gradle

      # সরাসরি সিস্টেম লেভেল জাভা এনভায়রনমেন্ট পুশ করে গ্রেডল বিল্ড রান করা
      - name: Build Android Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleDebug --no-daemon
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Upload Generated APK
        uses: actions/upload-artifact@v4
        with:
          name: Lexal-Social-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
